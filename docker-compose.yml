services:
  reaperset:
    build:
      context: .
    image: reaperset:local
    ports:
      - "47391:47391"
    environment:
      REAPERSET_PORT: "47391"
      REAPERSET_BRIDGE_DIR: /data
    volumes:
      - type: bind
        source: "${REAPERSET_BRIDGE_HOST_DIR:?Set REAPERSET_BRIDGE_HOST_DIR to the host .reaperset folder used by REAPER}"
        target: /data
    restart: unless-stopped
